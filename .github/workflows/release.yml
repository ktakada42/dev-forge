name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          ARCHIVE="forge-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C target/${{ matrix.target }}/release forge
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload assets
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --generate-notes \
            *.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256
        run: |
          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-musl x86_64-unknown-linux-musl; do
            sha=$(sha256sum "forge-${VERSION}-${target}.tar.gz" | awk '{print $1}')
            key="SHA_$(echo "${target}" | tr '-' '_')"
            echo "${key}=${sha}" >> "$GITHUB_ENV"
          done
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VER=${VER}"         >> "$GITHUB_ENV"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: ktakada42/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        run: |
          cat > homebrew-tap/Formula/forge.rb << EOF
          class Forge < Formula
            desc "Interactive CLI REPL for encoding, decoding, and conversion tasks"
            homepage "https://github.com/ktakada42/dev-forge"
            version "${VER}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ktakada42/dev-forge/releases/download/${VERSION}/forge-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_aarch64_apple_darwin}"
              else
                url "https://github.com/ktakada42/dev-forge/releases/download/${VERSION}/forge-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_x86_64_apple_darwin}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/ktakada42/dev-forge/releases/download/${VERSION}/forge-${VERSION}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_aarch64_unknown_linux_musl}"
              else
                url "https://github.com/ktakada42/dev-forge/releases/download/${VERSION}/forge-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_x86_64_unknown_linux_musl}"
              end
            end

            def install
              bin.install "forge"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/forge --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/forge.rb
          git commit -m "forge ${VER}"
          git push
